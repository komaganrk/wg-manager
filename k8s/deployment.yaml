apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-manager
  namespace: vpn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-manager
  template:
    metadata:
      labels:
        app: wg-manager
    spec:
      serviceAccountName: wg-manager
      imagePullSecrets:
        - name: your-registry-pull-secret
      containers:
        - name: wg-manager
          image: YOUR_REGISTRY/wg-manager:latest
          ports:
            - containerPort: 8080
          env:
            - name: WG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wg-manager-secret
                  key: password
            - name: WG_ENDPOINT
              value: "YOUR_SERVER_PUBLIC_IP"
            - name: WG_NAMESPACE
              value: vpn
            - name: WG_SECRET
              value: wireguard-keys
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wg-manager
  namespace: vpn
spec:
  selector:
    app: wg-manager
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
