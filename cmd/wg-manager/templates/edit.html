<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit {{.Peer.Name}} — WireGuard Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 1.5rem 1rem;
      color: #111;
    }
    .page { max-width: 480px; margin: 0 auto; }
    .back {
      display: inline-flex;
      align-items: center;
      color: #6b7280;
      text-decoration: none;
      font-size: .875rem;
      margin-bottom: 1rem;
    }
    .back:hover { color: #374151; }
    h1 { margin: 0 0 1.25rem; font-size: 1.3rem; }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 1.5rem;
    }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; font-weight: 500; color: #374151; margin-bottom: .35rem; }
    input[type=text] {
      width: 100%;
      padding: .45rem .75rem;
      font-size: .95rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
      font-family: monospace;
    }
    input[type=text]:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.2); }
    input[readonly] { background: #f9fafb; color: #6b7280; cursor: not-allowed; }
    .hint { font-size: .78rem; color: #9ca3af; margin-top: .3rem; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #b91c1c;
      font-size: .875rem;
      padding: .5rem .75rem;
      margin-bottom: 1rem;
    }
    .actions { display: flex; gap: .5rem; margin-top: 1.25rem; }
    .btn {
      flex: 1;
      padding: .5rem;
      border-radius: 6px;
      border: none;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-neutral { background: #e5e7eb; color: #374151; }
    .btn-neutral:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="back">← Back to peers</a>
    <h1>Edit peer</h1>

    <div class="card">
      {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
      <form method="POST" action="/peer/update">
        <input type="hidden" name="name" value="{{.Peer.Name}}">

        <div class="field">
          <label>Name</label>
          <input type="text" value="{{.Peer.Name}}" readonly>
        </div>

        <div class="field">
          <label for="ip">IP address</label>
          <input type="text" id="ip" name="ip" value="{{.Peer.IP}}" required>
          <p class="hint">Must be within {{.Subnet}} and not already assigned to another peer.</p>
        </div>

        <div class="actions">
          <a href="/" class="btn btn-neutral">Cancel</a>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
