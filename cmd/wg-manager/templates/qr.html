<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Name}} — WireGuard Config</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 1.5rem 1rem;
      color: #111;
    }
    .page { max-width: 600px; margin: 0 auto; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      color: #6b7280;
      text-decoration: none;
      font-size: .875rem;
      margin-bottom: 1rem;
    }
    .back:hover { color: #374151; }
    h1 { margin: 0 0 1.25rem; font-size: 1.3rem; }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .qr-wrap { text-align: center; }
    .qr-wrap img { max-width: 256px; width: 100%; image-rendering: pixelated; }
    .qr-hint { color: #9ca3af; font-size: .8rem; margin-top: .6rem; }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .card-title { font-weight: 600; font-size: .9rem; color: #374151; }
    pre {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: .75rem 1rem;
      font-size: .8rem;
      overflow-x: auto;
      margin: 0;
      white-space: pre;
    }
    .btn-dl {
      display: inline-flex;
      align-items: center;
      padding: .3rem .7rem;
      background: #4f46e5;
      color: #fff;
      border-radius: 5px;
      font-size: .8rem;
      font-weight: 500;
      text-decoration: none;
    }
    .btn-dl:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="back">← Back to peers</a>
    <h1>{{.Name}}</h1>

    <div class="card">
      <div class="qr-wrap">
        <img src="data:image/png;base64,{{.QRImage}}" alt="WireGuard QR code for {{.Name}}">
        <p class="qr-hint">Scan with the WireGuard mobile app</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Config file</span>
        <a href="/peer/config?name={{.Name}}" class="btn-dl">Download .conf</a>
      </div>
      <pre>{{.Config}}</pre>
    </div>
  </div>
</body>
</html>
