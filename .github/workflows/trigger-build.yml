name: Trigger oci-platform build

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_PAT }}
          repository: komaganrk/oci-platform
          event-type: build-wg-manager
          client-payload: '{"ref": "${{ github.sha }}"}'
